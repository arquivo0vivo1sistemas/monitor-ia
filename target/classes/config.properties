# Configura??es do Sistema de Processamento de Arquivos com IA

# Portas
webhook.port=8080
socket.port=9000

# Banco de Dados MySQL
db.url=jdbc:mysql://localhost:3306/arquivo_vivo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
db.username=root
db.password=
db.host=localhost
db.port=3306
db.name=arquivo_vivo

# Email (IMAP)
email.imap.host=imap.gmail.com
email.imap.port=993
email.user=
email.password=

# Processamento
processing.max_workers=10
processing.retry_attempts=3

# IA
ai.default_provider=chatgpt
# ai.chatgpt.api_key ser? obtido do banco
# ai.gemini.api_key ser? obtido do banco

# Caminhos (ajustar conforme servidor)
av.root=/home/av/ARQUIVO_VIVO/
av.bin=/home/av/ARQUIVO_VIVO/bin/
av.images=/home/av/ARQUIVO_VIVO/
av.temp=/home/av/ARQUIVO_VIVO/temp

# Limiar de similaridade por IMAGEM: >= este valor o frame ? considerado duplicata (ex.: 0.80, 0.88)
frames.limiar_similaridade_imagem=0.90
# Limiar de similaridade por TEXTO (descri??o): >= este valor o frame ? descartado na etapa 2 (ex.: 0.75, 0.80)
frames.limiar_similaridade_texto=0.75
# Numero minimo de frames para considerar conteudo suficiente na validacao do video
frames.minimo_para_suficiencia=4

# === Situacao critica para IA (controle de qualidade de frames) ===
# Variancia do Laplaciano < este valor = imagem borrada/critica (20-30)
frames.laplaciano_minimo=25
# Entropia < este valor (bits) = informacao insuficiente (ex.: 3.0)
frames.entropia_minima=3.0
# Mais de X% dos pixels em 0 ou 255 = imagem lavada ou saturada (ex.: 70%)
frames.pixels_extremos_max_percent=70
# Objeto relevante ocupando < X% da imagem = frame sem foco (1-2)
frames.objeto_minimo_percent=1.5

# Cliente de canhotos (socket) - host e porta do servidor de canhotos
# Alternativa: use variáveis de ambiente CANHOTO_SERVER_HOST e CANHOTO_SERVER_PORT
canhoto.server.host=34.172.65.67
canhoto.server.port=20002
